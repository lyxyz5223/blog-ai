<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <script>
      // GitHub Pages SPA routing fix
      // Save the original path and redirect to index.html
      // React Router will handle the routing from there
      
      const path = window.location.pathname;
      const baseUrl = '/blog-ai/';
      
      // Remove the base URL to get the relative path
      const relativePath = path.startsWith(baseUrl) 
        ? path.slice(baseUrl.length) 
        : path;
      
      // Save to sessionStorage (will be removed after routing)
      sessionStorage.setItem('redirect', relativePath + (window.location.search || '') + (window.location.hash || ''));
      
      // Redirect to index.html
      window.location.href = baseUrl;
    </script>
  </head>
  <body>
  </body>
</html>
