<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <script>
      // GitHub Pages SPA routing fix
      // When a route doesn't exist, GitHub Pages serves 404.html
      // We save the original path and redirect to index.html
      // React Router will then handle the invalid route and show NotFound page
      
      const path = window.location.pathname;
      const baseUrl = '/blog-ai/';
      
      // Remove the base URL to get the relative path
      let relativePath = path.startsWith(baseUrl) 
        ? path.slice(baseUrl.length) 
        : path;
      
      // Normalize: remove leading slashes which will be added back in main.jsx
      while (relativePath.startsWith('/')) {
        relativePath = relativePath.slice(1);
      }
      
      // Mark this as an invalid route so React can show NotFound page
      sessionStorage.setItem('redirectPath', relativePath + (window.location.search || '') + (window.location.hash || ''));
      
      console.log('🔴 [404] 路由不存在，重定向到首页:', relativePath);
      
      // Redirect to index.html (always exists)
      window.location.href = baseUrl;
    </script>
  </head>
  <body>
    正在重定向...
  </body>
</html>
